name: Apply crisp IronLog wordmark

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Apply crisp inline wordmark I
        run: |
          python - <<'PY'
          from pathlib import Path

          brand_svg = '''<svg xmlns="http://www.w3.org/2000/svg" width="216" height="352" viewBox="148 96 216 352" preserveAspectRatio="xMidYMid meet" role="img" aria-label="IronLog I mark" shape-rendering="geometricPrecision">
            <rect x="232" y="165" width="48" height="182" rx="10" fill="#edf4ff"/>
            <rect x="221" y="164" width="70" height="9" rx="4.5" fill="#37d6ca"/>
            <rect x="221" y="339" width="70" height="9" rx="4.5" fill="#37d6ca"/>
            <rect x="199" y="112" width="114" height="54" rx="13" fill="#edf4ff"/>
            <rect x="199" y="177" width="114" height="24" rx="12" fill="#edf4ff"/>
            <rect x="168" y="123" width="22" height="46" rx="10" fill="#edf4ff"/>
            <rect x="322" y="123" width="22" height="46" rx="10" fill="#edf4ff"/>
            <rect x="199" y="346" width="114" height="24" rx="12" fill="#edf4ff"/>
            <rect x="199" y="381" width="114" height="54" rx="13" fill="#edf4ff"/>
            <rect x="168" y="381" width="22" height="46" rx="10" fill="#edf4ff"/>
            <rect x="322" y="381" width="22" height="46" rx="10" fill="#edf4ff"/>
          </svg>
          '''
          Path('public/icons/brand-i.svg').write_text(brand_svg, encoding='utf-8')

          Path('src/components/BrandWordmark.jsx').write_text('''export function BrandWordmark() {
            return (
              <span className="brand-wordmark" aria-label="IronLog">
                <svg
                  className="brand-letter-icon"
                  viewBox="148 96 216 352"
                  aria-hidden="true"
                  focusable="false"
                  shapeRendering="geometricPrecision"
                >
                  <rect className="brand-letter-metal" x="232" y="165" width="48" height="182" rx="10" />
                  <rect className="brand-letter-accent" x="221" y="164" width="70" height="9" rx="4.5" />
                  <rect className="brand-letter-accent" x="221" y="339" width="70" height="9" rx="4.5" />
                  <rect className="brand-letter-metal" x="199" y="112" width="114" height="54" rx="13" />
                  <rect className="brand-letter-metal" x="199" y="177" width="114" height="24" rx="12" />
                  <rect className="brand-letter-metal" x="168" y="123" width="22" height="46" rx="10" />
                  <rect className="brand-letter-metal" x="322" y="123" width="22" height="46" rx="10" />
                  <rect className="brand-letter-metal" x="199" y="346" width="114" height="24" rx="12" />
                  <rect className="brand-letter-metal" x="199" y="381" width="114" height="54" rx="13" />
                  <rect className="brand-letter-metal" x="168" y="381" width="22" height="46" rx="10" />
                  <rect className="brand-letter-metal" x="322" y="381" width="22" height="46" rx="10" />
                </svg>
                <span aria-hidden="true">ronLog</span>
              </span>
            );
          }
          ''', encoding='utf-8')

          styles_path = Path('src/styles.css')
          styles = styles_path.read_text(encoding='utf-8')
          start = styles.index('.brand-wordmark {')
          end = styles.index('\n\n.eyebrow', start)
          styles = styles[:start] + '''.brand-wordmark {
            display: inline-flex;
            align-items: baseline;
            color: #edf4ff;
            font-weight: 900;
            letter-spacing: 0;
            line-height: 1;
            white-space: nowrap;
          }

          .brand-letter-icon {
            display: inline-block;
            flex: 0 0 auto;
            width: 0.5em;
            height: 0.84em;
            margin-right: 0.06em;
            transform: translateY(0.055em);
            overflow: visible;
          }

          .brand-letter-metal {
            fill: currentColor;
          }

          .brand-letter-accent {
            fill: #37d6ca;
          }''' + styles[end:]
          styles_path.write_text(styles, encoding='utf-8')

          for file_name in ('src/main.jsx', 'public/service-worker.js'):
              path = Path(file_name)
              text = path.read_text(encoding='utf-8').replace('ironlog-v6', 'ironlog-v7')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/icons/brand-i.svg src/components/BrandWordmark.jsx src/styles.css src/main.jsx public/service-worker.js
          if git diff --cached --quiet; then
            echo "No crisp wordmark changes to commit"
          else
            git commit -m "Render IronLog wordmark I as crisp inline vector"
            git push
          fi
