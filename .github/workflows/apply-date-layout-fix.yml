name: Apply IronLog date layout fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Patch date input layout styles
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/styles.css')
          text = path.read_text(encoding='utf-8')

          def replace_once(old, new):
              global text
              if old in text:
                  text = text.replace(old, new, 1)
              elif new in text:
                  return
              else:
                  raise SystemExit(f'Expected CSS block not found:\n{old}')

          replace_once(
              """input,\nselect,\ntextarea {\n  font-size: 16px;\n}\n""",
              """input,\nselect,\ntextarea {\n  box-sizing: border-box;\n  min-width: 0;\n  max-width: 100%;\n  font-size: 16px;\n}\n""",
          )

          replace_once(
              """select,\ninput {\n  width: 100%;\n  border: 1px solid #2c3a51;\n  border-radius: 8px;\n  padding: 11px 12px;\n  color: #edf4ff;\n  background: #0b1220;\n}\n\ntextarea {\n  width: 100%;\n  min-height: 88px;\n""",
              """select,\ninput {\n  width: 100%;\n  min-height: 46px;\n  border: 1px solid #2c3a51;\n  border-radius: 8px;\n  padding: 11px 12px;\n  color: #edf4ff;\n  background: #0b1220;\n}\n\ninput[type=\"date\"] {\n  display: block;\n  width: 100%;\n  max-width: 100%;\n  min-width: 0;\n  min-height: 46px;\n  line-height: 1.2;\n}\n\ninput[type=\"date\"]::-webkit-date-and-time-value {\n  min-height: 1.4em;\n  text-align: left;\n}\n\ntextarea {\n  width: 100%;\n  max-width: 100%;\n  min-width: 0;\n  min-height: 88px;\n""",
          )

          replace_once(
              """  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n}\n""",
              """  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  flex-wrap: wrap;\n  gap: 12px;\n}\n""",
          )

          replace_once(
              """.section-heading select,\n.section-heading input {\n  max-width: 170px;\n}\n""",
              """.section-heading select,\n.section-heading input {\n  max-width: min(170px, 100%);\n}\n""",
          )

          replace_once(
              """.form-panel {\n  display: grid;\n  gap: 14px;\n}\n\n.workout-meta {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 10px;\n}\n""",
              """.form-panel {\n  display: grid;\n  gap: 14px;\n  min-width: 0;\n}\n\n.workout-meta {\n  display: grid;\n  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);\n  gap: 10px;\n  align-items: stretch;\n}\n\n.field,\n.panel,\n.chart-card,\n.workout-meta > * {\n  min-width: 0;\n}\n""",
          )

          replace_once(
              """@media (max-width: 360px) {\n  .summary-grid,\n  .analytics-grid {\n    grid-template-columns: 1fr;\n  }\n\n  .tab {\n    font-size: 0.66rem;\n  }\n}\n\n@media (min-width: 720px) {\n""",
              """@media (max-width: 360px) {\n  .summary-grid,\n  .analytics-grid {\n    grid-template-columns: 1fr;\n  }\n\n  .tab {\n    font-size: 0.66rem;\n  }\n}\n\n@media (max-width: 430px) {\n  .workout-meta {\n    grid-template-columns: 1fr;\n  }\n\n  .section-heading select,\n  .section-heading input {\n    flex: 1 1 160px;\n    max-width: 100%;\n  }\n\n  .field input[type=\"date\"] {\n    inline-size: 100%;\n  }\n}\n\n@media (min-width: 720px) {\n""",
          )

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit CSS fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/styles.css
          if git diff --cached --quiet; then
            echo "No CSS changes to commit"
          else
            git commit -m "Fix mobile date input layout"
            git push
          fi
