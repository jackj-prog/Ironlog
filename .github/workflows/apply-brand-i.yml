name: Apply IronLog exact brand I

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Apply exact brand I
        run: |
          python - <<'PY'
          from pathlib import Path

          Path('public/icons').mkdir(parents=True, exist_ok=True)
          Path('public/icons/brand-i.svg').write_text('''<svg xmlns="http://www.w3.org/2000/svg" viewBox="148 96 216 352" role="img" aria-label="IronLog I mark">
            <defs>
              <linearGradient id="metal" x1="176" x2="332" y1="92" y2="424" gradientUnits="userSpaceOnUse">
                <stop stop-color="#ffffff"/>
                <stop offset="0.52" stop-color="#e6ebf1"/>
                <stop offset="1" stop-color="#cdd6df"/>
              </linearGradient>
              <linearGradient id="teal" x1="196" x2="316" y1="168" y2="344" gradientUnits="userSpaceOnUse">
                <stop stop-color="#38f5e4"/>
                <stop offset="1" stop-color="#1a9f9a"/>
              </linearGradient>
              <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000814" flood-opacity="0.48"/>
                <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.12"/>
              </filter>
            </defs>
            <g filter="url(#softShadow)">
              <rect x="232" y="165" width="48" height="182" rx="10" fill="url(#metal)"/>
              <rect x="221" y="164" width="70" height="9" rx="4.5" fill="url(#teal)"/>
              <rect x="221" y="339" width="70" height="9" rx="4.5" fill="url(#teal)"/>
              <rect x="199" y="112" width="114" height="54" rx="13" fill="url(#metal)"/>
              <rect x="199" y="177" width="114" height="24" rx="12" fill="url(#metal)"/>
              <rect x="168" y="123" width="22" height="46" rx="10" fill="url(#metal)"/>
              <rect x="322" y="123" width="22" height="46" rx="10" fill="url(#metal)"/>
              <rect x="199" y="346" width="114" height="24" rx="12" fill="url(#metal)"/>
              <rect x="199" y="381" width="114" height="54" rx="13" fill="url(#metal)"/>
              <rect x="168" y="381" width="22" height="46" rx="10" fill="url(#metal)"/>
              <rect x="322" y="381" width="22" height="46" rx="10" fill="url(#metal)"/>
            </g>
          </svg>
          ''', encoding='utf-8')

          Path('src/components/BrandWordmark.jsx').write_text('''export function BrandWordmark() {
            const brandIUrl = `${import.meta.env.BASE_URL}icons/brand-i.svg`;

            return (
              <span className="brand-wordmark" aria-label="IronLog">
                <img className="brand-letter-icon" src={brandIUrl} alt="" aria-hidden="true" />
                <span aria-hidden="true">ronLog</span>
              </span>
            );
          }
          ''', encoding='utf-8')

          styles_path = Path('src/styles.css')
          styles = styles_path.read_text(encoding='utf-8')
          start = styles.index('.brand-letter-icon {')
          end = styles.index('\n\n.eyebrow', start)
          styles = styles[:start] + '''.brand-letter-icon {
            display: inline-block;
            width: auto;
            height: 1.08em;
            margin-right: -0.02em;
            transform: translateY(0.075em);
            object-fit: contain;
          }''' + styles[end:]
          styles_path.write_text(styles, encoding='utf-8')

          main_path = Path('src/main.jsx')
          main = main_path.read_text(encoding='utf-8')
          if 'icons/brand-i.svg' not in main:
              main = main.replace("assetUrl(`${import.meta.env.BASE_URL}icons/app-icon.svg`),\n", "assetUrl(`${import.meta.env.BASE_URL}icons/app-icon.svg`),\n    assetUrl(`${import.meta.env.BASE_URL}icons/brand-i.svg`),\n")
          main = main.replace('ironlog-v4', 'ironlog-v5')
          main_path.write_text(main, encoding='utf-8')

          sw_path = Path('public/service-worker.js')
          sw = sw_path.read_text(encoding='utf-8')
          if './icons/brand-i.svg' not in sw:
              sw = sw.replace("  './icons/app-icon.svg',\n", "  './icons/app-icon.svg',\n  './icons/brand-i.svg',\n")
          sw = sw.replace('ironlog-v4', 'ironlog-v5')
          sw_path.write_text(sw, encoding='utf-8')
          PY
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/icons/brand-i.svg src/components/BrandWordmark.jsx src/styles.css src/main.jsx public/service-worker.js
          if git diff --cached --quiet; then
            echo "No brand I changes to commit"
          else
            git commit -m "Use exact icon extract in IronLog wordmark"
            git push
          fi
