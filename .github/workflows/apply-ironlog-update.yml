name: Apply IronLog icon and workout updates

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Apply payload from previous workflow version
        run: |
          git show HEAD^:.github/workflows/apply-ironlog-update.yml > /tmp/ironlog-payload.yml
          python - <<'PY'
          import base64
          import io
          import zipfile
          from pathlib import Path

          payload = Path('/tmp/ironlog-payload.yml').read_text(encoding='utf-8')
          encoded = payload.split("encoded = '''", 1)[1].split("'''", 1)[0]
          mapping = {
              'WorkoutScreen.jsx': 'src/screens/WorkoutScreen.jsx',
              'workoutTemplates.js': 'src/config/workoutTemplates.js',
              'exerciseSubstitutions.js': 'src/config/exerciseSubstitutions.js',
              'styles.css': 'src/styles.css',
              'app-icon.svg': 'public/icons/app-icon.svg',
              'apple-touch-icon.svg': 'public/icons/apple-touch-icon.svg',
              'favicon.svg': 'public/icons/favicon.svg',
              'service-worker.js': 'public/service-worker.js',
          }

          data = base64.b64decode(encoded)
          with zipfile.ZipFile(io.BytesIO(data)) as archive:
              for source, target in mapping.items():
                  destination = Path(target)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(archive.read(source))
          PY
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/screens/WorkoutScreen.jsx src/config/workoutTemplates.js src/config/exerciseSubstitutions.js src/styles.css public/icons/app-icon.svg public/icons/apple-touch-icon.svg public/icons/favicon.svg public/service-worker.js
          if git diff --cached --quiet; then
            echo "No app changes to commit"
          else
            git commit -m "Update IronLog icon and workout exercise picker"
            git push
          fi
