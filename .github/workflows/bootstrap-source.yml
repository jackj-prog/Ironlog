name: Bootstrap IronLog source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Unpack source tree
        run: |
          python - <<'PY'
          import base64
          import io
          import shutil
          import zipfile
          from pathlib import Path

          root = Path.cwd()
          part_dir = root / 'bootstrap-source'
          parts = sorted(part_dir.glob('source.part*'))
          if len(parts) != 8:
              raise SystemExit(f'Expected 8 source parts, found {len(parts)}')

          encoded = ''.join(part.read_text(encoding='utf-8').strip() for part in parts)
          data = base64.b64decode(encoded, validate=True)

          with zipfile.ZipFile(io.BytesIO(data)) as archive:
              names = set(archive.namelist())
              required = {
                  'package.json',
                  'index.html',
                  'vite.config.js',
                  '.github/workflows/pages.yml',
                  'src/App.jsx',
                  'src/main.jsx',
                  'src/storage/schema.js',
                  'src/screens/WorkoutScreen.jsx',
                  'src/styles.css',
              }
              missing = sorted(required - names)
              if missing:
                  raise SystemExit(f'Source archive missing required files: {missing}')

              for child in root.iterdir():
                  if child.name == '.git':
                      continue
                  if child.is_dir():
                      shutil.rmtree(child)
                  else:
                      child.unlink()

              archive.extractall(root)
          PY
      - name: Commit source tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit"
          else
            git commit -m "Bootstrap IronLog source"
            git push
          fi
