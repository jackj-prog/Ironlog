name: Bootstrap IronLog source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Unpack source tree
        run: |
          python - <<'PY'
          import base64
          import io
          import shutil
          import textwrap
          import zipfile
          from pathlib import Path

          root = Path.cwd()
          part_dir = root / 'bootstrap-source'
          parts = sorted(part_dir.glob('source.part*'))
          if len(parts) != 8:
              raise SystemExit(f'Expected 8 source parts, found {len(parts)}')

          encoded = ''.join(part.read_text(encoding='utf-8').strip() for part in parts)
          data = base64.b64decode(encoded, validate=True)

          with zipfile.ZipFile(io.BytesIO(data)) as archive:
              names = set(archive.namelist())
              required = {
                  'package.json',
                  'index.html',
                  'vite.config.js',
                  'src/App.jsx',
                  'src/main.jsx',
                  'src/storage/schema.js',
                  'src/screens/WorkoutScreen.jsx',
                  'src/styles.css',
              }
              missing = sorted(required - names)
              if missing:
                  raise SystemExit(f'Source archive missing required files: {missing}')

              for child in root.iterdir():
                  if child.name == '.git':
                      continue
                  if child.is_dir():
                      shutil.rmtree(child)
                  else:
                      child.unlink()

              archive.extractall(root)

          pages_workflow = textwrap.dedent('''\
          name: Deploy IronLog to GitHub Pages

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22
                - name: Install
                  run: npm install
                - name: Build
                  run: npm run build
                - name: Upload artifact
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: dist
            deploy:
              environment:
                name: github-pages
                url: __PAGE_URL__
              runs-on: ubuntu-latest
              needs: build
              steps:
                - name: Deploy
                  id: deployment
                  uses: actions/deploy-pages@v4
          ''').replace('__PAGE_URL__', '$' + '{{ steps.deployment.outputs.page_url }}')

          workflow_dir = root / '.github' / 'workflows'
          workflow_dir.mkdir(parents=True, exist_ok=True)
          (workflow_dir / 'pages.yml').write_text(pages_workflow, encoding='utf-8')
          PY
      - name: Commit source tree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit"
          else
            git commit -m "Bootstrap IronLog source"
            git push
          fi
